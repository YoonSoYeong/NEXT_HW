<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="./toss.css" />
        <script src="https://kit.fontawesome.com/18862fa128.js" crossorigin="anonymous"></script>
    </head>
    <body class="container" style="width: 400px; height: 3000px">
        <div class="topbox">
            <div class="tb" style="margin: -100px 20px">
                <img class="pic" src="KakaoTalk_20240321_005012778.png" style="margin: auto" />
                <h1 style="color: #a4afc1">toss</h1>
            </div>
            <div>
                <i class="fa-solid fa-location-dot" style="color: #a4afc1; font-size: 23px; margin-left: -20px"></i>
                <i class="fa-solid fa-bell" style="color: #a4afc1; font-size: 23px; padding: 20px"></i>
            </div>
        </div>

        <div id="titlebox" class="box">
            <div
                class="tb"
                style="justify-content: space-between; align-items: center; margin: auto 8%; margin-bottom: -5%"
            >
                <h3>토스뱅크</h3>
                <i class="fas fa-angle-right"></i>
            </div>
            <div class="t2">
                <img class="pic" src="KakaoTalk_20240320_201412767.png" style="padding: 10px" />
                <div>
                    <div class="text1">럭키박스 열고</div>
                    <div class="text2">돈 받기</div>
                </div>
            </div>
        </div>

        <div class="box">
            <div class="inner" style="padding: 15px">
                <img class="pic" src="스크린샷 2024-03-20 225757.png" style="width: 17%; margin-left: -55px" />
                <div style="margin-left: -98px">
                    <div class="text1">토스뱅크통장</div>
                    <div class="text2">999,999,999원</div>
                </div>
                <div class="blue" style="margin-right: -25px">송금</div>
            </div>

            <div class="mid">
                <div class="inner">
                    <img class="pic" src="KakaoTalk_20240320_201316841.png" />
                    <div style="margin-left: -35px">
                        <div class="text1">토스뱅크에 쌓인 이자</div>
                        <div class="text2">900,000원</div>
                    </div>
                    <div class="blue">지금 받기</div>
                </div>
            </div>

            <div class="mid">
                <div class="t2">
                    <img class="pic" src="KakaoTalk_20240320_201340045.png" style="padding: 10px" />
                    <div>
                        <div class="text1">토스뱅크 외화통장</div>
                        <div class="text2">10,000,000원</div>
                    </div>
                </div>
            </div>

            <div class="mid">
                <div class="inner">
                    <img class="pic" src="KakaoTalk_20240320_201316841.png" style="margin-left: -17px" />
                    <div style="margin-left: -35px">
                        <div class="text1 text">증권·토스 증권계좌</div>
                        <div class="text2 text">500,000원</div>
                    </div>
                    <div class="blue">송금</div>
                </div>
            </div>

            <div class="mid">
                <div class="t2">
                    <img class="pic" src="KakaoTalk_20240320_201316841.png" style="padding: 10px" />
                    <div class="text" style="padding-left: 30px">
                        <div class="text1">포인트·머니</div>
                        <div class="text2">1000원</div>
                    </div>
                </div>
            </div>

            <div id="acc" class="mid">
                <div class="text1">내 계좌, 대출, 증권, 포인트 보기</div>
                <div><i class="fas fa-angle-right"></i></div>
            </div>
        </div>

        <div class="inner box" style="padding: 20px; border-radius: 12%">
            <img class="pic" src="KakaoTalk_20240320_201429483.png" style="margin-left: -30px" />
            <div class="text" style="margin-left: -65px">
                <div class="text1">이번 달 쓴 금액</div>
                <div class="text2">486,012원</div>
            </div>
            <div id="new">새 내역 2건+</div>
        </div>

        <div class="plus box text1" style="padding: 10px">
            <div>계좌 개설</div>
            <div>카드 발급</div>
            <div>대출 받기</div>
        </div>

        <div class="bottombox">
            <div class="bt1">
                <i class="fa-solid fa-house" style="color: #a4afc1; font-size: 23px"></i>
                <i class="fa-solid fa-gem" style="color: #a4afc1; font-size: 23px"></i>
                <i class="fa-solid fa-bag-shopping" style="color: #a4afc1; font-size: 23px"></i>
                <i class="fa-solid fa-arrow-trend-up" style="color: #a4afc1; font-size: 23px"></i>
                <i class="fa-solid fa-bars" style="color: #a4afc1; font-size: 23px"></i>
            </div>
            <div class="bt2 text1">
                <div style="margin-left: 15px">홈</div>
                <div style="margin-left: 23px; margin-right: -5px">혜택</div>
                <div style="margin-left: 10px">토스페이</div>
                <div style="margin-right: 17px">주식</div>
                <div style="margin-right: 5px">전체</div>
            </div>
        </div>
    </body>
</html>
